version: 2.1

orbs:
  skip: theodo/skip@0.1.2
  queue: eddiewebb/queue@3.2.1
executors:
  node:
    docker:
      - image: cimg/node:24.11.1

parameters:
  lockfile:
    type: string
    default: './pnpm-lock.yaml'
  virtual_store_dir:
    type: string
    default: '.pnpm-store'
  cache_version:
    type: string
    default: 'v1'

workflows:
  version: 2
  mle_ci:
    jobs:
      - prepare_workspace_dependencies
      - lint:
          requires:
            - prepare_workspace_dependencies
      - build:
          requires:
            - prepare_workspace_dependencies
      - test_unit:
          requires:
            - prepare_workspace_dependencies
      - test_integration:
          requires:
            - prepare_workspace_dependencies

jobs:
  prepare_workspace_dependencies:
    executor: node
    steps:
      - checkout
      # - skip/skip_unchanged:
      #     paths: pnpm-lock.yaml
      - install_dependencies
      - run:
          name: 'Fetch dependencies'
          command: pnpm install --virtual-store-dir << pipeline.parameters.virtual_store_dir >> --frozen-lockfile
      - save_cache:
          key: << pipeline.parameters.cache_version >>-pnpm-{{ checksum "<< pipeline.parameters.lockfile >>" }}
          paths:
            - << pipeline.parameters.virtual_store_dir >>
            - ./node_modules
      
  lint:
    executor: node
    steps:
      - checkout
      - install_dependencies
      - create_dotenv_file
      - run:
          name: 'Lint'
          command: pnpm lint

  build:
    executor: node
    steps:
      - checkout
      - install_dependencies
      - create_dotenv_file
      - run:
          name: 'Build'
          command: pnpm build

  test_unit:
    executor: node
    steps:
      - checkout
      - install_dependencies
      - run:
          name: 'Run unit tests'
          command: pnpm test:unit

  test_integration:
    docker:
      - image: cimg/node:24.11.1
      - image: postgis/postgis:16-3.4
        environment:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: jde_test
    environment:
      DATABASE_URL_TEST: postgres://test:test@localhost:5432/jde_test
    steps:
      - checkout
      - install_dependencies
      - run:
          name: 'Wait for PostgreSQL'
          command: for i in $(seq 1 30); do pg_isready -h localhost -U test && break; sleep 2; done
      - run:
          name: 'Run Drizzle migrations'
          command: DATABASE_URL="$DATABASE_URL_TEST" pnpm drizzle-kit migrate
      - run:
          name: 'Run integration tests'
          command: pnpm test:integration

commands:
  install_pnpm:
    steps:
      - run:
          name: 'Install pnpm'
          command: sudo npm install -g pnpm
          
  install_dependencies:
    steps:
      - install_pnpm
      - restore_cache:
          keys:
            - << pipeline.parameters.cache_version >>-pnpm-{{ checksum "<< pipeline.parameters.lockfile >>" }}

  create_dotenv_file:
    steps:
      - run:
          name: 'Create .env file from .env.dist'
          command: |
            cp .env.dist .env